# HTTP — ACME challenge handler + redirect everything else to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mathingo.cz www.mathingo.cz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mathingo.cz$request_uri;
    }
}

# HTTPS — www subdomain redirects to apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.mathingo.cz;

    ssl_certificate     /etc/letsencrypt/live/mathingo.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mathingo.cz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 301 https://mathingo.cz$request_uri;
}

# HTTPS — apex (the real app)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mathingo.cz;

    ssl_certificate     /etc/letsencrypt/live/mathingo.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mathingo.cz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;
    proxy_connect_timeout 60s;

    # /api/foo → backend:/foo (trailing slash on proxy_pass strips the prefix)
    location /api/ {
        proxy_pass http://backend:8000/;
    }

    # everything else → frontend
    location / {
        proxy_pass http://frontend:3000;
    }
}
